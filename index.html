<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find SNHU course alternatives and certifications with a static GitHub Pages site.">
    <title>SNHU Alternatives</title>
    <link rel="icon" type="image/x-icon" href="/rss/images/favicon.ico">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="rss/style.css">
</head>
<body class="bg-cream text-brown">
    <main class="container py-4 py-lg-5">
        <section class="hero-card card border-0 shadow-sm mb-4">
            <div class="card-body p-4 p-lg-5">
                <div class="row align-items-center g-4">
                    <div class="col-12 col-lg-auto text-center text-lg-start">
                        <img src="rss/images/Icon.png" alt="SNHU alternatives logo" class="brand-logo img-fluid">
                    </div>
                    <div class="col-12 col-lg">
                        <h1 class="display-6 fw-bold mt-2 mb-3">Find SNHU course alternatives fast</h1>
                        <p class="lead mb-0 text-muted">
                            Search by exact course code or partial match to see certifications that transfer in as a given SNHU course.
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <section class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <form id="search-form" class="row g-3 align-items-end">
                    <div class="col-12 col-lg-7">
                        <label for="course-input" class="form-label fw-semibold">Enter a course ID</label>
                        <input id="course-input" class="form-control form-control-lg" type="text" placeholder="IT145, GEN1ELE, MAT142..." autocomplete="off" spellcheck="false">
                    </div>
                    <div class="col-12 col-lg-auto d-flex gap-2 flex-wrap">
                        <button id="search-button" type="submit" class="btn btn-coffee btn-lg">Search</button>
                        <button id="clear-button" type="button" class="btn btn-outline-coffee btn-lg">Clear</button>
                        <button id="copy-link-button" type="button" class="btn btn-ghost btn-lg">Copy link</button>
                    </div>
                </form>
                <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mt-3">
                    <p class="small text-muted mb-0">Try partial searches like <strong>GEN1</strong>, <strong>IT2</strong>, or <strong>ELE</strong>.</p>
                    <p id="status-text" class="small mb-0"></p>
                </div>
            </div>
        </section>

        <section id="results-area" class="mb-4">
            <div class="loading-state">
                <div class="spinner-border text-coffee mb-3" role="status" aria-hidden="true"></div>
                <p class="mb-0 text-muted">Loading course catalog...</p>
            </div>
        </section>
    </main>

    <script src="rss/search.js" defer></script>
</body>
</html>
